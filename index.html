        /* --- RESET Y BASES (Estilo SOTN) --- */
        * {

        /* CONTENEDOR DE ANUNCIO SUPERIOR */
        .ad-top-container {
            margin-bottom: 20px;
            min-height: 55px; /* Evita saltos de layout */
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .main-container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-family: 'Cinzel Decorative', cursive;
            color: #d4af37;
            text-align: center;
            text-transform: uppercase;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #8b0000;
            font-size: clamp(2rem, 8vw, 3.5rem);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-family: 'IM Fell English SC', serif;
            color: #b22222;
            text-align: center;
            font-size: 1.1rem;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 4px;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            display: inline-block;
        }

        /* GRID DE PROYECTOS */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            width: 100%;
            padding: 20px;
        }

        .grid-item {
            text-decoration: none;
            color: inherit;
            aspect-ratio: 1 / 1;
            background-color: #0a0a0a;
            border: 3px solid #444;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 15px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .grid-item::before, .grid-item::after {
            content: '';
            position: absolute;
            width: 15px; height: 15px;
            border-color: #d4af37;
            border-style: solid;
            pointer-events: none;
        }
        .grid-item::before { top: 5px; left: 5px; border-width: 2px 0 0 2px; }
        .grid-item::after { bottom: 5px; right: 5px; border-width: 0 2px 2px 0; }

        .grid-item:hover {
            border-color: #d4af37;
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 10px 20px rgba(255, 0, 0, 0.2), inset 0 0 10px rgba(255,0,0,0.3);
            background-color: #151515;
        }

        .grid-item .bg-graphic {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIklEQVQIW2NkQAKrVq36z8gAFWNhYGFEMhAN4unp+Y8MAAs4DRfAn48bAAAAAElFTkSuQmCC');
            opacity: 0.2;
            z-index: 1;
        }

        .project-info {
            position: relative;
            z-index: 2;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            padding: 10px;
        }

        .project-type {
            font-family: 'IM Fell English SC', serif;
            color: #888;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .grid-item:hover .project-type { color: #b22222; }

        .project-title {
            font-family: 'Times New Roman', serif;
            font-size: 1.2rem;
            font-weight: bold;
            color: #e0e0e0;
        }

        .grid-item:hover .project-title {
            color: #fff;
            text-shadow: 0 0 8px #d4af37;
        }

        footer {
            margin-top: 60px;
            font-size: 0.8rem;
            color: #666;
            font-family: 'IM Fell English SC', serif;
            text-align: center;
            border-top: 1px solid #222;
            padding: 20px;
            width: 100%;
            max-width: 1000px;
            text-transform: uppercase;
        }

        @media (max-width: 480px) {
            .project-grid { grid-template-columns: 1fr 1fr; gap: 15px; }
        }
    </style>
